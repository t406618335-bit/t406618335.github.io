<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업그레이드 테트리스</title>
    <style>
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .side-panel {
            width: 100px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .preview-box {
            border: 2px solid #4e4e6a;
            background: #000;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            border: 4px solid #4e4e6a;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .ui {
            width: 150px;
        }

        h1 { margin: 0; font-size: 22px; color: #00d2ff; }
        .stat-label { font-size: 12px; color: #aaa; margin-top: 15px; }
        .stat-value { font-size: 20px; margin-bottom: 10px; }

        button {
            padding: 10px;
            width: 100%;
            background: #00d2ff;
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        .controls-info {
            margin-top: 20px;
            font-size: 11px;
            color: #888;
            line-height: 1.8;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="game-layout">
        <div class="side-panel">
            <div class="stat-label">HOLD (Shift)</div>
            <div id="hold-box" class="preview-box">
                <canvas id="holdCanvas" width="80" height="80"></canvas>
            </div>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>

        <div class="ui">
            <h1>TETRIS</h1>
            <div class="stat-label">SCORE</div>
            <div id="score" class="stat-value">0</div>
            <button id="start-btn">시작 / 재시작</button>
            
            <div class="controls-info">
                ← → : 이동<br>
                ↑ : 회전<br>
                ↓ : 소프트 드롭<br>
                <b>Space : 하드 드롭</b><br>
                <b>Shift : 블록 교체</b>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const holdCanvas = document.getElementById('holdCanvas');
        const holdCtx = holdCanvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        context.scale(20, 20);
        holdCtx.scale(20, 20);

        const colors = [
            null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF',
        ];

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.lineWidth = 0.05;
                        ctx.strokeStyle = 'white';
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);

            // Hold 캔버스 그리기
            holdCtx.fillStyle = '#000';
            holdCtx.fillRect(0, 0, holdCanvas.width, holdCanvas.height);
            if (holdPiece) {
                drawMatrix(holdPiece, {x: 1, y: 1}, holdCtx);
            }
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            updateScore();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        let holdPiece = null;
        let canHold = true;

        function playerHold() {
            if (!canHold) return;
            
            if (!holdPiece) {
                holdPiece = createPiece(player.type);
                playerReset();
            } else {
                const temp = createPiece(player.type);
                player.matrix = holdPiece;
                player.type = getPieceTypeFromMatrix(holdPiece); 
                holdPiece = temp;
                player.pos.y = 0;
                player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            }
            canHold = false;
        }

        function getPieceTypeFromMatrix(m) {
            // 편의상 첫 번째 발견되는 숫자로 타입을 역추적
            for(let row of m) for(let val of row) if(val !== 0) return 'ILJOTSZ'[val-1];
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.type = pieces[pieces.length * Math.random() | 0];
            player.matrix = createPiece(player.type);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            canHold = true;
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            draw();
            requestAnimationFrame(update);
        }

        const arena = Array.from({length: 20}, () => Array(12).fill(0));
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, type: null };

        // 조작 이벤트 핸들러
        document.addEventListener('keydown', event => {
            switch(event.keyCode) {
                case 37: playerMove(-1); break;      // 왼쪽 방향키
                case 39: playerMove(1); break;       // 오른쪽 방향키
                case 40: playerDrop(); break;        // 아래 방향키 (소프트 드롭)
                case 38: playerRotate(1); break;     // 위 방향키 (회전)
                case 32: playerHardDrop(); break;    // 스페이스바 (하드 드롭)
                case 16: playerHold(); break;        // Shift 키 (홀드/교체)
            }
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            playerReset();
            updateScore();
            update();
        });
    </script>
</body>
</html>
